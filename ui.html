<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      font-size: 12px;
      margin: 0;
      padding: 16px;
      color: #1e1e1e;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 13px;
      font-weight: 600;
    }
    .section-label {
      margin: 16px 0 8px 0;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      background: #18a0fb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }
    button:hover:not(:disabled) { background: #0d8de4; }
    button:active:not(:disabled) { background: #0c7fcc; }
    button:disabled {
      background: #e5e5e5;
      color: #aaa;
      cursor: not-allowed;
    }
    .btn-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }
    .nav-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .nav-btn {
      padding: 8px 0;
      justify-content: center;
    }
    .nav-btn .btn-icon {
      width: 18px;
      height: 18px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      user-select: none;
      cursor: pointer;
    }
    .toggle-row input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }
    .toggle-track {
      position: relative;
      flex-shrink: 0;
      width: 28px;
      height: 16px;
      background: #c4c4c4;
      border-radius: 8px;
      transition: background 0.15s ease;
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      transition: left 0.15s ease;
    }
    .toggle-row input:checked ~ .toggle-track {
      background: #18a0fb;
    }
    .toggle-row input:checked ~ .toggle-track .toggle-thumb {
      left: 14px;
    }
    #status {
      margin-top: 12px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      min-height: 18px;
      color: #333;
      font-size: 11px;
    }
    #status.empty { color: #888; }
    #status.error { background: #fef0f0; color: #b91c1c; }
  </style>
</head>
<body>

  <h2>TableMaster</h2>

  <div class="buttons">
    <button id="select-row"><svg class="btn-icon"><use href="#i-table-row"/></svg>Выделить строку</button>
    <button id="select-column"><svg class="btn-icon"><use href="#i-table-column"/></svg>Выделить столбец</button>
    <button id="select-all" disabled><svg class="btn-icon"><use href="#i-select-all"/></svg>Выделить все ячейки</button>
    <button id="clear-selection" disabled><svg class="btn-icon"><use href="#i-close"/></svg>Снять выделение</button>
  </div>

  <label class="toggle-row">
    <input type="checkbox" id="include-header" />
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
    <span>Включать заголовок</span>
  </label>

  <div class="section-label">Навигация</div>
  <div class="nav-row">
    <button class="nav-btn" id="nav-prev-col" disabled title="Сдвинуть столбец влево"><svg class="btn-icon"><use href="#i-arrow-left"/></svg></button>
    <button class="nav-btn" id="nav-next-col" disabled title="Сдвинуть столбец вправо"><svg class="btn-icon"><use href="#i-arrow-right"/></svg></button>
    <button class="nav-btn" id="nav-prev-row" disabled title="Сдвинуть строку вверх"><svg class="btn-icon"><use href="#i-arrow-up"/></svg></button>
    <button class="nav-btn" id="nav-next-row" disabled title="Сдвинуть строку вниз"><svg class="btn-icon"><use href="#i-arrow-down"/></svg></button>
  </div>

  <div class="section-label">Расширение</div>
  <div class="nav-row">
    <button class="nav-btn" id="exp-col-left" disabled title="Расширить столбцом слева"><svg class="btn-icon"><use href="#i-arrow-expand-left"/></svg></button>
    <button class="nav-btn" id="exp-col-right" disabled title="Расширить столбцом справа"><svg class="btn-icon"><use href="#i-arrow-expand-right"/></svg></button>
    <button class="nav-btn" id="exp-row-up" disabled title="Расширить строкой сверху"><svg class="btn-icon"><use href="#i-arrow-expand-up"/></svg></button>
    <button class="nav-btn" id="exp-row-down" disabled title="Расширить строкой снизу"><svg class="btn-icon"><use href="#i-arrow-expand-down"/></svg></button>
  </div>

  <div class="section-label">Сужение</div>
  <div class="nav-row">
    <button class="nav-btn" id="shr-col-left" disabled title="Убрать крайний левый столбец из выделения"><svg class="btn-icon"><use href="#i-arrow-collapse-left"/></svg></button>
    <button class="nav-btn" id="shr-col-right" disabled title="Убрать крайний правый столбец из выделения"><svg class="btn-icon"><use href="#i-arrow-collapse-right"/></svg></button>
    <button class="nav-btn" id="shr-row-up" disabled title="Убрать верхнюю строку из выделения"><svg class="btn-icon"><use href="#i-arrow-collapse-up"/></svg></button>
    <button class="nav-btn" id="shr-row-down" disabled title="Убрать нижнюю строку из выделения"><svg class="btn-icon"><use href="#i-arrow-collapse-down"/></svg></button>
  </div>

  <div class="section-label">Добавить</div>
  <div class="nav-row">
    <button class="nav-btn" id="add-col-left" disabled title="Дублировать крайний левый столбец выделения и вставить слева"><svg class="btn-icon"><use href="#i-table-column-plus-before"/></svg></button>
    <button class="nav-btn" id="add-col-right" disabled title="Дублировать крайний правый столбец выделения и вставить справа"><svg class="btn-icon"><use href="#i-table-column-plus-after"/></svg></button>
    <button class="nav-btn" id="add-row-up" disabled title="Дублировать верхнюю строку выделения и вставить сверху"><svg class="btn-icon"><use href="#i-table-row-plus-before"/></svg></button>
    <button class="nav-btn" id="add-row-down" disabled title="Дублировать нижнюю строку выделения и вставить снизу"><svg class="btn-icon"><use href="#i-table-row-plus-after"/></svg></button>
  </div>

  <div class="section-label">Перемещение</div>
  <div class="nav-row">
    <button class="nav-btn" id="move-col-left" disabled title="Поменять столбец местами с соседним слева"><svg class="btn-icon"><use href="#i-table-arrow-left"/></svg></button>
    <button class="nav-btn" id="move-col-right" disabled title="Поменять столбец местами с соседним справа"><svg class="btn-icon"><use href="#i-table-arrow-right"/></svg></button>
    <button class="nav-btn" id="move-row-up" disabled title="Поменять строку местами с соседней сверху (не с заголовком)"><svg class="btn-icon"><use href="#i-table-arrow-up"/></svg></button>
    <button class="nav-btn" id="move-row-down" disabled title="Поменять строку местами с соседней снизу"><svg class="btn-icon"><use href="#i-table-arrow-down"/></svg></button>
  </div>

  <div class="section-label">Преобразование</div>
  <div class="buttons">
    <button id="convert" disabled title="Преобразовать таблицу между Stack auto-layout и Grid auto-layout"><svg class="btn-icon"><use href="#i-swap-vertical"/></svg><span id="convert-label">Преобразовать</span></button>
  </div>

  <div class="section-label">Экспорт</div>
  <div class="buttons">
    <button id="copy-csv" disabled title="Скопировать значения выделенных ячеек в буфер обмена как CSV"><svg class="btn-icon"><use href="#i-content-copy"/></svg>Копировать в CSV</button>
  </div>

  <div id="status" class="empty">Выделите ячейку таблицы</div>

  <script>
    const btnRow = document.getElementById('select-row');
    const btnCol = document.getElementById('select-column');
    const btnAll = document.getElementById('select-all');
    const btnClear = document.getElementById('clear-selection');
    const cbHeader = document.getElementById('include-header');
    const navPrevCol = document.getElementById('nav-prev-col');
    const navNextCol = document.getElementById('nav-next-col');
    const navPrevRow = document.getElementById('nav-prev-row');
    const navNextRow = document.getElementById('nav-next-row');
    const expColLeft = document.getElementById('exp-col-left');
    const expColRight = document.getElementById('exp-col-right');
    const expRowUp = document.getElementById('exp-row-up');
    const expRowDown = document.getElementById('exp-row-down');
    const shrColLeft = document.getElementById('shr-col-left');
    const shrColRight = document.getElementById('shr-col-right');
    const shrRowUp = document.getElementById('shr-row-up');
    const shrRowDown = document.getElementById('shr-row-down');
    const addColLeft = document.getElementById('add-col-left');
    const addColRight = document.getElementById('add-col-right');
    const addRowUp = document.getElementById('add-row-up');
    const addRowDown = document.getElementById('add-row-down');
    const moveColLeft = document.getElementById('move-col-left');
    const moveColRight = document.getElementById('move-col-right');
    const moveRowUp = document.getElementById('move-row-up');
    const moveRowDown = document.getElementById('move-row-down');
    const btnCopyCsv = document.getElementById('copy-csv');
    const btnConvert = document.getElementById('convert');
    const convertLabel = document.getElementById('convert-label');
    const status = document.getElementById('status');

    function send(payload) {
      parent.postMessage({ pluginMessage: payload }, '*');
    }
    function header() { return cbHeader.checked; }

    // CSV предвычисляется плагином на каждом state push и хранится здесь.
    // При клике на «Копировать в CSV» execCommand вызывается СИНХРОННО
    // в обработчике клика — это нужно чтобы user gesture был свежим.
    let pendingCsv = '';

    function copyTextSync(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
      document.body.removeChild(ta);
      return ok;
    }

    btnRow.addEventListener('click', () => send({ type: 'select-row', includeHeader: header() }));
    btnCol.addEventListener('click', () => send({ type: 'select-column', includeHeader: header() }));
    btnAll.addEventListener('click', () => send({ type: 'select-all', includeHeader: header() }));
    btnClear.addEventListener('click', () => send({ type: 'clear-selection' }));

    navPrevCol.addEventListener('click', () => send({ type: 'nav', mode: 'column', direction: 'prev', includeHeader: header() }));
    navNextCol.addEventListener('click', () => send({ type: 'nav', mode: 'column', direction: 'next', includeHeader: header() }));
    navPrevRow.addEventListener('click', () => send({ type: 'nav', mode: 'row', direction: 'prev' }));
    navNextRow.addEventListener('click', () => send({ type: 'nav', mode: 'row', direction: 'next' }));

    expColLeft.addEventListener('click', () => send({ type: 'expand', mode: 'column', direction: 'prev', includeHeader: header() }));
    expColRight.addEventListener('click', () => send({ type: 'expand', mode: 'column', direction: 'next', includeHeader: header() }));
    expRowUp.addEventListener('click', () => send({ type: 'expand', mode: 'row', direction: 'prev' }));
    expRowDown.addEventListener('click', () => send({ type: 'expand', mode: 'row', direction: 'next' }));

    shrColLeft.addEventListener('click', () => send({ type: 'shrink', mode: 'column', direction: 'prev', includeHeader: header() }));
    shrColRight.addEventListener('click', () => send({ type: 'shrink', mode: 'column', direction: 'next', includeHeader: header() }));
    shrRowUp.addEventListener('click', () => send({ type: 'shrink', mode: 'row', direction: 'prev' }));
    shrRowDown.addEventListener('click', () => send({ type: 'shrink', mode: 'row', direction: 'next' }));

    cbHeader.addEventListener('change', () => send({ type: 'toggle-header', includeHeader: cbHeader.checked }));

    addColLeft.addEventListener('click', () => send({ type: 'add', mode: 'column', direction: 'prev' }));
    addColRight.addEventListener('click', () => send({ type: 'add', mode: 'column', direction: 'next' }));
    addRowUp.addEventListener('click', () => send({ type: 'add', mode: 'row', direction: 'prev' }));
    addRowDown.addEventListener('click', () => send({ type: 'add', mode: 'row', direction: 'next' }));

    moveColLeft.addEventListener('click', () => send({ type: 'move', mode: 'column', direction: 'prev' }));
    moveColRight.addEventListener('click', () => send({ type: 'move', mode: 'column', direction: 'next' }));
    moveRowUp.addEventListener('click', () => send({ type: 'move', mode: 'row', direction: 'prev' }));
    moveRowDown.addEventListener('click', () => send({ type: 'move', mode: 'row', direction: 'next' }));

    btnCopyCsv.addEventListener('click', () => {
      if (!pendingCsv) {
        status.textContent = 'Нет выделенных ячеек';
        status.classList.remove('empty');
        status.classList.add('error');
        return;
      }
      const ok = copyTextSync(pendingCsv);
      if (ok) {
        const lines = pendingCsv.split('\n').length;
        status.textContent = 'CSV скопирован: ' + lines + (lines === 1 ? ' строка' : ' строк');
        status.classList.remove('empty', 'error');
      } else {
        status.textContent = 'Не удалось записать в буфер обмена';
        status.classList.remove('empty');
        status.classList.add('error');
      }
    });
    btnConvert.addEventListener('click', () => send({ type: 'convert' }));

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'status') {
        status.textContent = msg.message;
        status.classList.remove('empty', 'error');
        if (!msg.ok) status.classList.add('error');
      } else if (msg.type === 'nav-state') {
        navPrevCol.disabled = !msg.canPrevCol;
        navNextCol.disabled = !msg.canNextCol;
        navPrevRow.disabled = !msg.canPrevRow;
        navNextRow.disabled = !msg.canNextRow;
        expColLeft.disabled = !msg.canExpColLeft;
        expColRight.disabled = !msg.canExpColRight;
        expRowUp.disabled = !msg.canExpRowUp;
        expRowDown.disabled = !msg.canExpRowDown;
        shrColLeft.disabled = !msg.canShrinkColLeft;
        shrColRight.disabled = !msg.canShrinkColRight;
        shrRowUp.disabled = !msg.canShrinkRowUp;
        shrRowDown.disabled = !msg.canShrinkRowDown;
        btnAll.disabled = !msg.canSelectAll;
        btnClear.disabled = !msg.canClearSelection;
        addColLeft.disabled = !msg.canAddColLeft;
        addColRight.disabled = !msg.canAddColRight;
        addRowUp.disabled = !msg.canAddRowUp;
        addRowDown.disabled = !msg.canAddRowDown;
        moveColLeft.disabled = !msg.canMoveColLeft;
        moveColRight.disabled = !msg.canMoveColRight;
        moveRowUp.disabled = !msg.canMoveRowUp;
        moveRowDown.disabled = !msg.canMoveRowDown;
        btnCopyCsv.disabled = !msg.canCopyCsv;
        btnConvert.disabled = !msg.canConvert;
        if (msg.tableType === 'stack') {
          convertLabel.textContent = 'Преобразовать в Grid';
        } else if (msg.tableType === 'grid') {
          convertLabel.textContent = 'Преобразовать в Stack';
        } else {
          convertLabel.textContent = 'Преобразовать';
        }
        pendingCsv = msg.csv || '';
      } else if (msg.type === 'init-state') {
        // Программная установка .checked не вызывает change event — toggle-header не сработает
        cbHeader.checked = !!msg.includeHeader;
      }
    };

    send({ type: 'init' });
  </script>
</body>
</html>
